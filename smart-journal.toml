[blob_store]
backend = "local_cas"
root = "./data/blobs"

[meta_store]
backend = "sqlite"
path = "./data/meta.db"

[vector_index]
backend = "in_memory"

[job_queue]
backend = "in_process"

[extractor]
backend = "plain_text"

[embedding_provider]
backend = "mock_text"
dim = 8
normalize = true

[llm_provider]
backend = "mock_chat"
